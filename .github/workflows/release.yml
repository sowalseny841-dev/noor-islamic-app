name: 🚀 Build & Release Noor App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.29.0'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────
  # BUILD ANDROID
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/noor-release.keystore
          fi

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=noor-release.keystore
          EOF
          fi

      - name: Build AAB (Release)
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-symbols \
            --build-name=${{ github.event.inputs.version || '1.0.0' }} \
            --build-number=${{ github.run_number }}

      - name: Build APK (Universal - for testing)
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-symbols \
            --build-name=${{ github.event.inputs.version || '1.0.0' }} \
            --build-number=${{ github.run_number }}

      - name: Rename artifacts
        run: |
          VERSION=${{ github.event.inputs.version || '1.0.0' }}
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/noor-v${VERSION}.aab
          mv build/app/outputs/apk/release/app-release.apk \
             build/app/outputs/apk/release/noor-v${VERSION}-universal.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/noor-*.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/apk/release/noor-*.apk
          retention-days: 30

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols
          path: build/debug-symbols/
          retention-days: 30

  # ─────────────────────────────────────────────
  # BUILD iOS (nécessite Mac runner)
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios && pod install

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign - for testing)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ github.event.inputs.version || '1.0.0' }} \
            --build-number=${{ github.run_number }}

      - name: Archive iOS build
        run: |
          VERSION=${{ github.event.inputs.version || '1.0.0' }}
          cd build/ios/iphoneos
          zip -r ../../../noor-v${VERSION}-ios-nosign.zip Runner.app
          cd ../../..

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: noor-v*-ios-nosign.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # CRÉER LA GITHUB RELEASE
  # ─────────────────────────────────────────────
  create-release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always() && needs.build-android.result == 'success' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: release-assets/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0.0' }}
          name: "🌙 Noor v${{ github.event.inputs.version || '1.0.0' }} — Lancement Officiel"
          body: |
            # نور — Noor v${{ github.event.inputs.version || '1.0.0' }}

            ## ✨ Application Islamique Complète

            ### Fonctionnalités
            - 🕌 **Horaires de prière** par GPS (5 prières + notifications Azan)
            - 📖 **Coran complet** avec traduction française et audio
            - 📿 **Azkar quotidiens** — matin, soir, après-prière
            - 🔮 **Tasbih électronique** avec perles animées
            - 🧭 **Boussole Qibla** en temps réel
            - 📅 **Calendrier Hijri** interactif
            - 🌍 **Communauté Ummah** — fil de partage islamique

            ### Téléchargements
            | Fichier | Usage |
            |---------|-------|
            | `noor-v*.aab` | Upload Google Play Store |
            | `noor-v*-universal.apk` | Test sur appareil Android |
            | `noor-v*-ios-nosign.zip` | Build iOS (nécessite re-signing) |

            ### Installation Android (test direct)
            ```
            adb install noor-v${{ github.event.inputs.version || '1.0.0' }}-universal.apk
            ```

            ### Publication Store
            Voir [`store/PUBLICATION_GUIDE.md`](store/PUBLICATION_GUIDE.md) pour le guide complet.

            ---
            *Build #${{ github.run_number }} — بارك الله فيكم*
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
